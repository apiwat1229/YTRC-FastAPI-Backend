# Production environment override
# Usage: docker-compose -p ytrc-prod -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d --build
# Stop:  docker-compose -p ytrc-prod -f docker-compose.yml -f docker-compose.prod.yml down

services:
  db:
    container_name: ytrc-fastapi-db
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    container_name: ytrc-fastapi-pgadmin
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api:
    container_name: ytrc-fastapi-api
    restart: always
    env_file:
      - .env.production
    ports:
      - "2530:2530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:2530/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "2530", "--log-level", "warning"]
    deploy:
      resources:
        limits:
          memory: 512M
